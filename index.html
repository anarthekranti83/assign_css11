
<!DOCTYPE html>
<html>
<head>
    <title>CSS Integration Example</title>

    <!-- Document Level -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
        }

        h2 {
            color: green;
            text-align: center;
        }

        .box {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 style="color: blue; text-align: center;">
        Welcome to My Webpage
    </h1>
    <!-- Inline CSS used above -->

    <h2>Document Level CSS Example</h2>

    <div class="box">
        This box is styled using internal (document-level) CSS.
    </div>

    <h2>External CSS Example</h2>

    <p class="external-text">
        This paragraph is styled using external CSS.
    </p>

</body>
</html>
